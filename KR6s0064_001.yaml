body:
  text: 發四無量心願諸衆生常住安樂具安樂因願諸衆生遠離苦惱及苦惱因願諸衆生不相捨離無苦安樂願諸衆生悉捨人我冤親平等南無皈依金剛上師皈依佛皈依法皈依僧我今發心不為自求人天福報聲聞緣覺乃至權乘諸位菩薩唯依最上乘發菩提心願與法界衆生一時同得阿耨多羅三藐三菩提心我今大發正覺心誓願皈依三寶修行善功普施平等心願法界衆生皆發菩提心同歸於善道咸得如來無上等正覺是故稱讚諸佛南無皈依十方盡虛空界一切諸佛南無皈依十方盡虛空界一切尊法南無皈依十方盡虛空界一切神聖僧南無釋迦牟尼佛南無須彌光明佛南無法光佛南無功德輪佛南無華香佛南無普光明佛南無法施莊嚴佛南無大明佛南無清淨身佛南無旃檀佛南無大琉璃佛南無法峯雲幢佛南無寶山佛南無無盡光佛南無功德佛南無善華王佛南無虛空光明佛南無普賢佛南無無量聲佛南無歡喜佛南無寶光明佛南無須彌旃檀佛南無寶輪佛南無清淨聲佛南無多智佛南無法光明佛南無摩訶提闍佛南無大幢佛南無如意光佛南無無量佛南無大然燈佛南無光明莊嚴佛南無普明佛南無盧舍那佛南無須彌佛南無大光明佛南無毗羅那王佛南無普光佛南無無礙輪佛南無多寶佛南無淨嚴身佛南無雲王光明佛南無慧燈佛南無清淨根佛南無師子佛南無大莊嚴佛南無阿難陀聲佛南無妙聲佛南無普照觀佛南無金光佛南無大修行佛南無虛空莊嚴佛南無寶光佛南無無勝香佛南無無畏佛南無大精進佛南無菩提光明佛南無寶幢佛南無歡喜王佛南無華光佛南無大牟尼佛南無無邊光明佛南無法王佛南無師子聲佛南無然燈佛南無妙莊嚴佛南無摩訶羅他佛南無妙香佛南無無垢勝佛南無光輪佛南無喜莊嚴佛南無提婆羅多佛南無大稱佛南無成就光佛南無天華佛南無妙光明佛南無修盧遮那佛南無淨王佛南無無礙稱佛南無龍天佛南無普然燈佛南無無上光明佛南無淨聲佛南無師子幢佛南無名稱佛南無智光明佛南無然燈勝王佛南無大通佛南無自在光佛南無堅固佛南無寶莊嚴佛南無普香光明佛南無梵聲佛南無無垢光佛南無明暗佛南無普華光佛南無修樓毗香佛南無淨天佛南無成就堅佛南無無垢佛南無東方衆佛南無堅王華佛南無光明莊嚴佛南無阿閦佛南無不可思議佛南無南方衆佛南無師子聲佛南無住持疾行佛南無威王佛南無莊嚴王佛南無聲稱佛南無西方衆佛南無無量壽佛南無香手奮迅佛南無寶山佛南無香積王佛南無光王佛南無北方衆佛南無金色王佛南無智日普照佛南無自在佛南無金上威佛南無旃檀佛南無無量佛南無光華敷身佛南無慈行佛南無自在幢佛南無具足功德佛南無最上佛南無寶山莊嚴佛南無燈明佛南無無量光佛南無一切成就佛南無善世佛南無波頭摩王佛南無娑羅佛南無驚怖幢佛南無普蓋光明佛南無金色華佛南無無邊精進佛南無賢身佛南無蓮華名佛南無一切善行佛南無妙勝佛南無無邊威德佛南無日光佛南無恆河沙佛南無無量功德佛南無妙光明佛南無總持得名佛南無月華佛南無世淨光佛南無一切種照佛南無無垢光佛南無平等思惟佛南無妙樂尼佛南無不動寂靜佛南無金剛堅佛南無寶聚光明佛南無阿樓那勝佛南無放光明佛南無善住調智佛南無平等行佛南無清淨光明佛南無然燈堅固佛南無快莊嚴佛南無日月無垢佛南無解脫幢佛南無甘露清淨佛南無樂心教聲佛南無寶住持佛南無供養華光佛南無法勝王佛南無樹王豐長佛南無淨光佛南無慈力王佛南無龍天佛南無無憂懷佛南無雲王光明佛南無海豐佛南無毗舍浮佛南無觀方佛南無作諸方佛南無波羅羅堅佛南無慧燈佛南無如淨王佛南無堅才佛南無寶燈王佛南無毗羅闍光佛南無大光佛南無功德成佛南無華須佛南無火光明佛南無羅多那光佛南無滿賢佛南無然寶燈佛南無常鏡佛南無梵光明佛南無虛空平等佛南無法明佛南無無垢幢佛南無天智佛南無智香勝佛南無盧遮那稱佛南無勝光佛南無功德華佛南無龍月佛南無放光明佛南無法財聲王佛南無海香佛南無甘露光佛南無香山佛南無諸摩尊無盡受光佛南無衆勝解脫佛南無無染佛南無普現佛南無色光佛南無智慧佛南無毗迦摩佛南無不害法王佛南無無量自在佛南無清淨佛南無善住佛南無善香佛南無不住佛南無槃頭華佛南無無盡智藏佛南無法慧增長佛南無華智佛南無妙勝佛南無日燈佛南無普照佛南無闍耶天佛南無二寶法燈佛南無善勢自在佛南無無滯佛南無大聖佛南無法華佛南無妙色佛南無毗舍浮佛南無不動尼陀佛南無智日普照佛南無調勝佛南無廣救佛南無勝賢佛南無淨上佛南無諸方天佛南無成就光明佛南無賢智不動佛南無華勝佛南無普護佛南無吉沙佛南無住智佛南無那伽天佛南無功德莊嚴佛南無成就智德佛南無龍步佛南無勝意佛南無梵天佛南無普行佛南無菩提光佛南無最勝香王佛南無一切作樂佛南無光焰佛南無不動佛南無梵光佛南無法像佛南無金光明佛南無無量翼從佛南無寶勝功德佛南無無住佛南無最上佛南無善明佛南無廣照佛南無光明王佛南無無量慧稱佛南無法體決定佛南無龍勝佛南無大德佛南無上慈佛南無智勝佛南無須尼多佛南無無量執持佛南無諸寶上德佛南無賢勝佛南無不壞佛南無淨根佛南無寶月佛南無娑羅王佛南無無量慧雄佛南無種種色相佛南無吉祥佛南無實相佛南無淨魔佛南無寶藏佛南無因那陀佛南無善寂成就佛南無智慧自在佛南無歡樂佛南無覺悟佛南無帝幢佛南無淨垢佛南