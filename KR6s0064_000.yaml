body:
  text: 諸佛世尊如來菩薩尊者神僧名經序諸佛世尊如來菩薩尊者神僧弘發誓願濟度群生凡發善心稱讚諸佛世尊如來菩薩尊者神僧名號者即得種種善報輕薄侮慢不敬不信者即得種種惡報善惡之機若影之隨形響之應聲不爽錙銖所謂為善者忠於君上孝於父母敬天地奉祖宗尊三寶敬神明遵王法謹言行愛惜物命廣行陰隲如是則生享富貴歿升天堂受諸快樂所謂為惡者不忠於君不孝於親不敬天地不奉祖宗不尊三寶不敬神明不遵王法不謹言行殘害物命不積陰隲如是則生遭重譴死墮地獄受諸苦報嘗觀諸佛世尊如來菩薩尊者神僧千經萬典開導誘掖作無量方便勸人為善幽明果報明有徵應間取佛經所載諸佛世尊如來菩薩尊者神僧名號編成歌曲歡喜讚諷功德弘深因以鋟梓流通廣傳俾善男子善女人潔淨一心至誠頂禮依腔奉誦共成勝因其有至誠事佛不解依腔讚諷者只依此編頂禮念誦俱感人天證果佛祖鑒臨生則衣食豐足壽年延永罪業消釋死則不墮九幽脫離諸苦延及先世皆得超度凡有所求吉祥如意此無它蓋由人心一念之善昭著感格故其效驗之大有如此者凡人平居終日不事檢束放泆侈肆惡言穢語淫辭邪曲觸汙天地褻慢神明皆足以招致罪戾苟能改悔洗心滌慮將此讚揚念念不忘即得消災滅罪增長福德有不可量於戲善惡之報皆由己作故曰為善福隨為惡禍追又曰修一念善遠階覺道起一念惡長淪苦海又曰欲知前世因今生受者是欲知後世因令生作者是此皆勸人為善去惡誠金玉之格言也雖然世之能勸人為善者往往皆獲福應況人之躬行於善終始不懈則獲福其可量哉昔竇禹鈞修德行善纍積陰隲其後名挂天曹克臻壽考子孫榮顯流慶無窮陳實居鄉平心率物化盜為善由是一邑蒙化無復盜竊其後壽祉繁夥子孫榮貴並著高名福澤綿永延及後世若此者昭著簡册不可殫舉今略述此以冠于編首普勸善緣使人人同歸於善以造夫佛地以登夫仁壽之域以樂夫太平之治其懋之哉其敬之哉永樂十五年四月十七日世尊啓大慈悲弘大誓願濟度歷劫生死沉淪俾皆成佛道教臣以忠教子以孝教兄以友教弟以恭教朋友以信教夫婦以順教敬神明教重三寶所以維持世教陰翊皇度其言曰聖人之為教也勸臣以忠勸子以孝勸國以治勸家以和弘善示天堂之樂懲非顯地獄之苦立忠立孝所以揚名於後代行逆行乖所以受報於來世盡忠立孝濟國治家開生天淨路成第一福田讒間君臣誣毀善良所造罪業無量無邊五逆不孝順天地容不得王法鎮乾坤犯了休不得貪著世樂不信三寶其後命終墮餓鬼中怨黷天地呵責鬼神貶斥聖賢如是罪業無量無邊毀謗如來壞正法輪於諸菩薩訾辱傷害不久當墮三惡道中昔信相菩薩問佛言今有受罪衆生為諸獄卒銼碓斬身斬訖巧風吹活而復斬之何罪所致佛言以前世不信三尊不忠君王不孝父母殺生害命故獲斯罪昔有人見道邊一死人鬼神以杖鞭之行人言此人已死何故鞭之鬼神言此人在生之日不忠君王不孝父母不敬三寶不友兄弟不信朋友不誠夫婦死受諸痛苦又見一死人天人來下散花尸上以手摩挲之問云觀君似是天人何故以手摩挲死尸答云此人在生之日忠以事君孝事父母敬奉三寶友于兄弟信于朋友義于夫婦故今得生天堂受諸快樂凡此者不可盡數姑略舉其槩耳世尊愍念衆生作種種方便超脫苦趣無非欲人盡忠盡孝人不忠孝能改為忠孝即是忠孝若執迷不改必遭刑戮今王法所誅皆不忠不孝之人凶暴無賴非化所遷即佛所謂有罪不得不殺有惡不得不刑殺可殺刑可刑所以滌拔惡類扶植善良顯揚三寶永隆佛教廣利一切夫善惡兩塗為善則吉為惡則凶其言曰善惡有先後禍福有遲速為善生天為惡入淵作善得福為惡受殃大善積而災消衆惡盈而福滅行善感樂如影隨形作惡招苦猶聲發響莫輕小善以為無福小善不種無以成聖莫輕小惡以為無罪小惡所積足以滅身善心初發上天之寶殿先成惡念才萌下地之火城已具發善心者於福有基行善事者於福有報發惡心者於罪有基行惡事者於罪有報福在積善禍在積惡善惡路分禍福可覩隨行種殃福自獲善惡報善惡報應如指諸掌善惡二輪未嘗暫歇果報連環初無休息善惡相翻罪福皎然所以惡名俯墜善譽清升發善言者於福有因發惡言者於罪有因語善則人天勝趣述惡則三途劇報行善之人如春園之草不見其長日有所增行惡之人如磨刀之石不見其日有所虧天網報應甚速心念善法受報亦善心念惡法受報亦惡心動有逆順故善惡之情生焉善惡之情已發故禍福之應至焉情之有淺深報之有輕重好生之心善好殺之心惡善惡之感可不慎乎常應親善人遠離於惡友以近善人故能舍諸惡業生殺有因果善惡有報應行惡得樂為惡未熟至其惡熟自見受苦修善遇苦為善未熟至其善熟自見受樂何者為福惟行善道凡修萬福皆助菩提善人行善獲福益壽善若不修則人道絶萬德種善菩提資糧宿造諸善緣百劫而不朽崇善建福樹果修因善著則迹彰迹彰則譽集修少善行受福無量卑聽善言不墮三惡片行之善永為身資一念之福終為神用一善染心萬劫不朽心中念善福祿自隨心中念惡罪苦自追愚人樂惡至死不休為惡雖少後苦無邊如毒在身終為重患若行邪道身壞命終墮於惡趣罪積而天殃自至罪成則地獄斯罰罪貫若滿天必戮之惡口之罪墮三惡道心為毒主口為禍器因事成災沿流惡道惡口而兩舌好説它人過如是不善人無惡而不造毒害雖甚惡惟能殺一身妄語惡業者百千身被壞惡口如毒箭著物則破傷地獄開門待投之以鑊湯若以惡口令他鬪亂則是兩舌得罪最深起一念惡獲無量罪惡顯於事業獲罪於幽冥惡人行惡命短苦長為惡於明顯者人得而誅之為惡於幽暗者鬼得而誅之人心惡天不錯昔有人好生濟物不欺方寸稟性方正篤志履道專心為善生享福壽康寧死即為神蔭及子孫長遠富貴昔有人殺生害命人利己凶暴邪淫姦盜詐偽妄言綺語專心為惡死入無間地獄受諸苦報永不出世纍及九玄七祖及于後世子孫俱墮惡業似此者不可勝計姑以二事為徵大覺興慈悲之念愍此惡趣終於迷墮發大哀憐作善巧方便令為惡者洗心懺悔歸向善道即得從前所作過惡悉皆消滅一切冤對悉皆脫離如王法赦過宥罪嘉與維新夫為善必當廣行陰隲不可暴戾凶虐陰隲者善之源也暴戾者惡之根也故為善者為君子必享福祿為惡者為小人必招禍殃人生在世必當為善不可為惡萌一善念已有司善之神為著録使之身享富貴年躋上壽子孫昌盛家門清吉諸災消滅延及祖先皆得超升舉一惡念已有司過之神為書黑籍使之身遭困厄年復不永子孫衰微門戶零替諸災畢至纍及祖先皆復墮落昔有人好行陰隲為人除害陰德陽報德勝不祥仁除百禍上天眷之使富貴壽考有好行善政興利除害德及民物著名天府白日升天有為善濟物獲明珠之報有好行陰隲治獄平恕理直冤枉不使受誣後至子孫通顯纍世榮盛有仁愛拯物見雀被困懷而飼之後獲玉環之報有為將忠於為國不妄殺人功名蓋世其後纍世寵貴有資濟貧舉未能葬者位至顯官享有封爵有濟活物命及第登朝歷官顯要者有拾遺不收舉以還人陰德及物位至拜封者有賑荒恤患全活生民者歷仕通顯子孫蕃盛若此者衆難以盡數聊舉其略是故諸佛世尊如來菩薩尊者神僧勸人為善廣修陰隲於五濁惡世化導種種衆生俾咸躋善塗以登覺道誓願弘深愍念三界濟度迷誤若人所積殺生害命之罪稱念諸佛世尊如來菩薩尊者神僧名號即得此罪消釋永絶殺害之報若人纏繞貪嗔癡恚稱念諸佛世尊如來菩薩尊者神僧名號即得遠離貪嗔癡恚之業若人素造姦盜詐偽及種種罪業者稱念諸佛世尊如來菩薩尊者神僧名號即令諸造種種罪業咸得解脫若人起種種惡念欲回心向善稱念諸佛世尊如來菩薩尊者神僧名號懺悔前愆即得種種惡念消除善根不滅若有人渡江泛海或遇惡風巨浪魚龍諸怪怖畏驚恐稱念諸佛世尊如來菩薩尊者神僧名號即得風波頓息魚龍諸怪悉皆伏藏若人登山度嶺或逢猛虎毒蛇及諸惡獸蠥蟲為害者稱念諸佛世尊如來菩薩尊者神僧名號即得猛虎毒蛇惡獸蠥蟲悉皆退避若人猝遇刀兵寇盜欲加殺害稱念諸佛世尊如來菩薩尊者神僧名號即得刀兵寇盜悉皆解散不復為害若人身罹刑獄桎繫枷鎖稱念諸佛世尊如來菩薩尊者神僧名號即得身出囚獄枷鎖脫離若人沾患疾病沉綿痼帶服藥無效稱念諸佛世尊如來菩薩尊者神僧名號即得疾病安痊平復如舊若人見乏子息稱念諸佛世尊如來菩薩尊者神僧名號即得産生貴子紹繼宗嗣若人見世貧窮殘疾醜陋得人憎惡稱念諸佛世尊如來菩薩尊者神僧名號身沒之後即得託生富貴之家體貌美好得人憐愛若女人稱念諸佛世尊如來菩薩尊者神僧名號身沒之後即得託生為男子身若人所作種種惡因當受諸種種果報稱念諸佛世尊如來菩薩尊者神僧名號即得種種果報悉皆消除不墮三途六道受地獄種種諸苦報諸佛世尊如來菩薩尊者神僧行深願重愍濟衆生誠能發心向善廣布陰隲至心頂禮無不立應自然遠離諸罪自然得歡喜心自然成最上福田自然得成佛道佛法大無量稱名多福德為善與為惡一切惟心造為善若登山步步上高頂為惡如入壑步步下深淵又如種瓜果善惡分甜苦種甜還得甜種苦受苦報報應如影響自然無爭差一毫善念萌神明咸擁護一毫惡念興鬼神陰斬勘世人廣善念惡意甚勿萌念念佛音聲永證上乘果十方佛如來一切諸菩薩為語諸衆生廣發慈悲念諸惡切莫作諸善必奉行稱念佛如來有緣登覺道
